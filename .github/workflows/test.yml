name: Go Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: |
            go.work
            exercises/**/go.sum

      - name: Format check
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Test with race detector
        run: make test
